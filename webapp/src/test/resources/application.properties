# ─── Test Configuration (H2 in PostgreSQL mode) ─────────────────────────────

# ─── Default Datasource (bridge + webapp) ───────────────────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:iot-default;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.packages=io.casehub.iot.bridge.persistence.jpa,io.casehub.iot.webapp.app.persistence
quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/iot-bridge/migration,classpath:db/iot-webapp/migration

# ─── iot-work Datasource (work + ledger) ────────────────────────────────────
quarkus.datasource.iot-work.db-kind=h2
quarkus.datasource.iot-work.jdbc.url=jdbc:h2:mem:iot-work;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.iot-work.username=sa
quarkus.datasource.iot-work.password=

quarkus.hibernate-orm.iot-work.packages=io.casehub.work.runtime.model
quarkus.hibernate-orm.iot-work.database.generation=none

quarkus.flyway.iot-work.migrate-at-start=true
quarkus.flyway.iot-work.locations=classpath:db/work/migration,classpath:db/ledger/migration

# ─── iot-ras Datasource (RAS isolated) ───────────────────────────────────────
quarkus.datasource.iot-ras.db-kind=h2
quarkus.datasource.iot-ras.jdbc.url=jdbc:h2:mem:iot-ras;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.iot-ras.username=sa
quarkus.datasource.iot-ras.password=

quarkus.flyway.iot-ras.migrate-at-start=true
quarkus.flyway.iot-ras.locations=classpath:db/ras/migration

# ─── Disable Schedulers ──────────────────────────────────────────────────────
quarkus.scheduler.enabled=false

# ─── Disable IoT Providers ───────────────────────────────────────────────────
casehub.iot.homeassistant.enabled=false
casehub.iot.openhab.enabled=false

# ─── Tenancy ─────────────────────────────────────────────────────────────────
casehub.iot.tenancy-id=test-tenant
